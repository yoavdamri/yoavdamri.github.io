<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoav Damri Projects</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #334155 100%);
      color: #f8fafc;
      font-family: Inter, system-ui, sans-serif;
    }
    .card {
      max-width: 420px;
      width: 100%;
      padding: 32px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 40px 120px rgba(15, 23, 42, 0.35);
      text-align: center;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 24px;
      padding: 14px 24px;
      border-radius: 999px;
      background: #f59e0b;
      color: #0f172a;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    a.button:hover {
      transform: translateY(-2px);
      background: #d97706;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to Yoav Damri’s GitHub Pages</h1>
    <p>Explore my projects and games below.</p>
    <a class="button" href="solaredge/">Open SolarEdge Monitor</a>
    <a class="button" href="english/">Play Brawl Battle</a>
    <a class="button" href="EVNotify/">Open EVNotify</a>
  </div>
</body>
</html>
