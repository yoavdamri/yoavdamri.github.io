<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <title>PWA Push Demo</title>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>
</head>
<body style="text-align:center; padding-top: 50px; font-family: sans-serif;">

    <div id="auth-section">
        <button id="login-btn" style="padding: 20px; font-size: 20px;">Login with Google</button>
    </div>

    <div id="main-section" style="display:none;">
        <h1>Welcome!</h1>
        <button id="push-btn" style="width: 80%; height: 200px; font-size: 24px; background: #4285f4; color: white; border: none; border-radius: 15px;">
            Push in 10 Seconds
        </button>
        <p id="status"></p>
    </div>

    <script>
        const firebaseConfig = { /* YOUR FIREBASE CONFIG HERE */ };
        firebase.initializeApp(firebaseConfig);

        const loginBtn = document.getElementById('login-btn');
        const mainSection = document.getElementById('main-section');
        const authSection = document.getElementById('auth-section');

        // 1. Google Login
        loginBtn.onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider);
        };

        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                authSection.style.display = 'none';
                mainSection.style.display = 'block';
                setupPush();
            }
        });

        // 2. Setup Push Subscription
        async function setupPush() {
            const registration = await navigator.serviceWorker.register('sw.js');
            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: 'YOUR_PUBLIC_VAPID_KEY'
            });

            document.getElementById('push-btn').onclick = async () => {
                document.getElementById('status').innerText = "Request sent! Wait 10s...";

                // Send subscription to your backend
                await fetch('https://your-backend.com/notify', {
                    method: 'POST',
                    body: JSON.stringify({ subscription, delay: 10000 }),
                    headers: { 'Content-Type': 'application/json' }
                });
            };
        }
    </script>
</body>
</html>
